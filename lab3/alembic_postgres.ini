[alembic]
script_location = alembic
sqlalchemy.url = postgresql://postgres:DB_PASSWORD@localhost:5432/lab3BDsem2

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = CRITICAL
handlers = console

[logger_sqlalchemy]
level = CRITICAL
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = CRITICAL
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
